<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Miso.</title>
        <style>
			/*bismillah nbda nkteb les commentaires :)*/
			/*l code ayjikom chwiya mrewen hit chi l3ibat mabghawch yt9adoli mn de9a lewla 3adi katw9e3 f ar9a l 3ailat*/
            /*hada dyala logo*/
            .logo {
            font-family: sans-serif;
            margin-left: 7px;
            padding: 0;
            font-size: 19px;
            }
            /* les bouttons li f l header */ 
            .btn-1, .btn-2, .btn-3{
            background-color: #000;
            color: #fff;
            border: 2px solid #fff;
            padding: 10px 20px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            border-radius: 50px;
            cursor: pointer;
            transition: background-color 0.3s, color 0.3s;
            }
            .btn-1:hover, .btn-2:hover, .btn-3:hover {
            background-color: #fff;
            color: #000;
            }
            .btn-1 {
            position: absolute;
			right: 35px;
            }
            .btn-2{
            position: absolute;
			right: 140px;
            }
			.btn-3{
            position: absolute;
			right: 228px;
            }
            /*lblasa dyal recherche*/
            .x {
            max-width: 270px;
            height: 30px;
            width: 100%;
            position: absolute;
            left: 960px;
            margin-top: 75px;
            background-color: #b4b3b3;
            border: none;
            padding: 10px;
            border-radius: 30px;
            outline: none;
            color: black;
            }
            .x:hover {
            animation: rotateShadow 2s infinite;
            }
            @keyframes rotateShadow {
            0% {
            box-shadow: -2px -2px 8px 1px #f51212, 2px 2px 8px 1px rgb(255, 132, 0);
            }
            25% {
            box-shadow: -2px 2px 8px 1px #f2ff37, 2px -2px 8px 1px rgb(0, 254, 8);
            }
            50% {
            box-shadow: 2px 2px 8px 1px #37cdff, -2px -2px 8px 1px rgb(55, 0, 255);
            }
            75% {
            box-shadow: 2px -2px 8px 1px #f237ff, -2px 2px 8px 1px rgb(249, 6, 91);
            }
            100% {
            box-shadow: -2px -2px 8px 1px #ff011e, 2px 2px 8px 1px rgb(252, 2, 2);
            }
            }
			/* l alwan li kaytherko hhhhh*/
			.star1{
  			width: 650px;
			height: 579px;
  			background-size: cover;
  			margin-left: 0;
  			transition: background-image 1s;
			}
			.star1 {
			background-image: url('star 1.png');
			animation: changeImages 10s infinite;
			}
			@keyframes changeImages {
  			0% {
    		background-image: url('star 1.png');
  			}
  			14% {
    		background-image: url('star 2.png');
  			}
  			28% {
    		background-image: url('star 3.png');
  			}
  			42% {
    		background-image: url('star 4.png');
  			}
  			56% {
    		background-image: url('star 5.png');
  			}
			70% {
    		background-image: url('star 6.png');
  			}
			84% {
    		background-image: url('star 7.png');
  			}
			}
			.p1{
				width: 100%;
				font-size: 30px;
				font-family: Arial, Helvetica, sans-serif;
				margin-left: 770px;
				margin-top: 160px;
			}
        </style>
    </head>
    <body>
		<div class="star1">
			<header>
				<span class="logo">Miso.</span>
				<button class="btn-1">About us</button>
				<button class="btn-2">Log in</button>
				<button class="btn-3">Sign up</button>
			</header> 	
			<input placeholder="Search for articles..." class="x" name="text" type="text"/>
			<p class="p1">Welcome to</p>
		</div>
    </body>
</html>
