<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Miso.</title>
        <style>
			body{
				margin: 0;
				padding: 0;
			}
			/*hada dyala logo*/
            .logo {
            font-family: sans-serif;
            margin-left: 7px;
            font-size: 19px;
            }
            /* les bouttons li f l header */ 
            .btn-1, .btn-2, .btn-3{
            background-color: #000;
            color: #fff;
            border: 2px solid #fff;
            padding: 10px 20px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            border-radius: 50px;
            cursor: pointer;
            transition: background-color 0.3s, color 0.3s;
            }
            .btn-1:hover, .btn-2:hover, .btn-3:hover {
            background-color: #fff;
            color: #000;
            }
            .btn-1 {
            position: absolute;
			right: 35px;
            }
            .btn-2{
            position: absolute;
			right: 140px;
            }
			.btn-3{
            position: absolute;
			right: 228px;
            }
            /*lblasa dyal recherche*/
            .x {
            max-width: 270px;
            height: 30px;
            width: 100%;
            position: absolute;
            left: 960px;
            margin-top: 75px;
            background-color: #b4b3b3;
            border: none;
            padding: 10px;
            border-radius: 30px;
            outline: none;
            color: black;
            }
            .x:hover {
            animation: rotateShadow 2s infinite;
            }
            @keyframes rotateShadow {
            0% {
            box-shadow: -2px -2px 8px 1px #ff9adc, 2px 2px 8px 1px rgb(251, 142, 255);
            }
            25% {
            box-shadow: -2px 2px 8px 1px #ff37c6cd, 2px -2px 8px 1px rgba(254, 174, 0, 0.74);
            }
            50% {
            box-shadow: 2px 2px 8px 1px #c2c6c7, -2px -2px 8px 1px rgb(155, 154, 161);
            }
            75% {
            box-shadow: 2px -2px 8px 1px #261d98e2, -2px 2px 8px 1px rgb(120, 111, 243);
            }
            100% {
            box-shadow: -2px -2px 8px 1px #ea83ff, 2px 2px 8px 1px rgb(254, 158, 212);
            }
            }
			/* l alwan li kaytherko hhhhh*/
			.star1{
  			width: 510px;
			height: 595px;
  			background-size: cover;
  			margin-left: 0;
  			transition: background-image 1s ease-in-out;
			}
			.star1 {
			background-image: url('star/cat1/star 1.png');
			animation: changeImages 10s infinite ease-in-out;
			}
			@keyframes changeImages {
  			0% {
    		background-image: url('star/cat1/star 1.png');
  			}
  			14% {
    		background-image: url('star/cat2/star 2.png');
  			}
  			28% {
    		background-image: url('star/cat3/star 3.png');
  			}
  			42% {
    		background-image: url('star/cat4/star 4.png');
  			}
  			56% {
    		background-image: url('star/cat5/star 5.png');
  			}
			70% {
    		background-image: url('star/cat6/star 6.png');
  			}
			84% {
    		background-image: url('star/cat7/star 7.png');
  			}
			}
			.p1{
				width: 100%;
				font-size: 30px;
				font-family: Arial, Helvetica, sans-serif;
				margin-left: 770px;
				margin-top: 160px;
			}
        </style>
    </head>
    <body>
		<div class="star1">
			<header>
				<span class="logo">Miso.</span>
				<button class="btn-1">About us</button>
				<button class="btn-2">Log in</button>
				<button class="btn-3">Sign up</button>
			</header> 	
			<input placeholder="Search for articles..." class="x" name="text" type="text"/>
			<p class="p1">Welcome to</p>
		</div>
    </body>
</html>
